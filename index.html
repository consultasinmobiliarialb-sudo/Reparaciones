<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzlkjmA0gwWdFsSqXG84FU8aHqJHngv1FY5VNfzCC1Q3Q0MDv2q2NBPDhL9CnjyFDzv9w/exec";

let store = { general: [], reclamos: [], proveedores: [] };
let ch = {}, propData = {};

function tick(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('es-AR');}
tick(); setInterval(tick, 1000);

function switchTab(tab){
  document.getElementById('tab-reclamos').style.display = tab==='reclamos' ? '' : 'none';
  document.getElementById('tab-propiedades').style.display = tab==='propiedades' ? '' : 'none';
  document.getElementById('tab-proveedores').style.display = tab==='proveedores' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(tab==='reclamos' && i===0) || (tab==='propiedades' && i===1) || (tab==='proveedores' && i===2)));
  if(tab==='propiedades') renderProps();
  if(tab==='proveedores') renderProveedores();
}

function load(){
  document.getElementById('loader').classList.add('on');
  const old=document.getElementById('_jsonp_v2'); if(old) old.remove();
  window._lbCb = function(json){
    document.getElementById('loader').classList.remove('on');
    if(!json.ok){ alert('Error en sincronización'); return; }
    store.general = json.data.general || [];
    store.reclamos = json.data.reclamos || [];
    store.proveedores = json.data.proveedores || [];
    fillFilters();
    go();
    const timeStr = new Date().toLocaleTimeString('es-AR');
    document.getElementById('syncLbl').textContent = 'Sincronizado ' + timeStr;
    document.getElementById('slbl').textContent = store.reclamos.length + ' actuales / ' + store.general.length + ' históricos';
    document.getElementById('ftr').textContent = 'Última actualización de la base: ' + timeStr;
  };
  const s=document.createElement('script'); s.id='_jsonp_v2';
  s.src=API_URL+'?callback=_lbCb&t='+Date.now();
  document.body.appendChild(s);
}

function fillFilters(){
  const ys=new Set(), ms=new Set();
  store.general.forEach(r=>{ const p=(r['Mes']||'').split('-'); if(p.length===2){ ys.add(p[1]); ms.add(p[0]); } });
  store.reclamos.forEach(r=>{ const p=(r['Mes']||'').split('-'); if(p.length===2){ ys.add(p[1]); ms.add(p[0]); } });
  const MN=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const yel=document.getElementById('yf'); yel.innerHTML='<option value="all">Todos los años</option>';
  [...ys].sort((a,b)=>b-a).forEach(v=>yel.innerHTML+='<option value="'+v+'">'+v+'</option>');
  const mel=document.getElementById('mf'); mel.innerHTML='<option value="all">Todos los meses</option>';
  [...ms].sort((a,b)=>+a-+b).forEach(v=>mel.innerHTML+='<option value="'+v+'">'+(MN[+v]||v)+'</option>');
}

function getFiltered(dataset) {
  const yr=document.getElementById('yf').value, mo=document.getElementById('mf').value;
  return dataset.filter(r=>{
    const p=(r['Mes']||'').split('-');
    if(yr!=='all' && p[1]!==yr) return false;
    if(mo!=='all' && p[0]!==mo) return false;
    return true;
  });
}

function go(){
  renderReclamosActuales();
  if(document.getElementById('tab-propiedades').style.display!=='none') renderProps();
  if(document.getElementById('tab-proveedores').style.display!=='none') renderProveedores();
}

function pN(v){const s=String(v||'').replace(/[\$\s\,]/g,'').replace(/[^0-9.\-]/g,'');const n=parseFloat(s);return isNaN(n)?0:Math.abs(n);}
function pD(v){if(!v)return null;const d=new Date(v);return isNaN(d)?null:d;}
function diff(a,b){if(!a||!b)return null;return Math.round(Math.abs(b-a)/864e5);}
function fmtF(n){return n?'$'+Math.round(n).toLocaleString('es-AR'):'—';}

function renderReclamosActuales(){
  const cur = getFiltered(store.reclamos).map(r=>({
    ...r,
    _dir: r['Dirección'] || 'Sin Dirección',
    _tot: pN(r['Total Pagado']) || (pN(r['Mano de Obra'])+pN(r['Materiales'])),
    _prov: (r['Contratista Asignado']||'').trim() || 'Sin asignar',
    _rec: pD(r['Fecha Recepción Mail']),
    _diag: pD(r['Fecha Visita/Diagnóstico'])
  }));
  const tot=cur.length, closed=cur.filter(r=>(r['Estado Actual']||'')==='Cerrado').length;
  const totalBilled = cur.reduce((s,r)=>s+r._tot,0);
  const times = cur.filter(r=>r._rec && r._diag).map(r=>diff(r._rec, r._diag)).filter(v=>v>=0);
  const avg = times.length ? (times.reduce((a,b)=>a+b,0)/times.length).toFixed(1) + ' días' : '—';
  document.getElementById('rk1').textContent = tot;
  document.getElementById('rk2').textContent = fmtF(totalBilled);
  document.getElementById('rk3').textContent = avg;
  document.getElementById('rk4').textContent = closed;
  document.getElementById('rk5').textContent = tot - closed;
  const body = document.getElementById('tblReclamosBody');
  if(!cur.length){ body.innerHTML='<tr><td colspan="7" class="nodata">No se registran reparaciones en este período</td></tr>'; return; }
  body.innerHTML = cur.map(r=>{
    const est = r['Estado Actual'] || 'Pendiente';
    const bc = est==='Cerrado'?'b-g': (est.includes('Aprobado')?'b-y':'b-r');
    return '<tr><td style="font-weight:600">#'+(r['N° Reclamo']||'—')+'</td><td style="font-size:12px">'+(r['Fecha Recepción Mail']||'—')+'</td><td style="font-weight:500;color:var(--green)">'+r._dir+'</td><td><span class="rubro-tag">'+(r['Rubro'] || 'Mantenimiento')+'</span></td><td style="font-size:13px">'+r._prov+'</td><td><span class="badge '+bc+'">'+est+'</span></td><td class="tr" style="font-weight:600;color:var(--green)">'+fmtF(r._tot)+'</td></tr>';
  }).join('');
}

function renderProps(){
  const hist = getFiltered(store.general);
  propData = {};
  hist.forEach(r=>{
    const dir = (r['DIRECCION'] || '').trim(); if(!dir) return;
    const totalCost = pN(r['Mano de Obra']) + pN(r['Materiales']) || pN(r['PAGADO']);
    if(!propData[dir]) propData[dir] = { prop: r['PROPIETARIO']||'—', inq: r['INQUILINO']||'—', totalInvested: 0, count: 0, rows: [] };
    propData[dir].totalInvested += totalCost;
    propData[dir].count++;
    propData[dir].rows.push({ ref: 'Histórico #' + (r['N° Reclamo'] || 'S/N'), date: r['Recepción Reclamo'] || '—', desc: r['PEDIDO DE REPARACION'] || '—', prov: (r['Contratista Asignado'] || 'Sin Asignar').trim(), cost: totalCost });
  });
  const dirs = Object.keys(propData), totalUnits = dirs.length;
  const globalInvesment = dirs.reduce((s,d)=>s+propData[d].totalInvested, 0);
  document.getElementById('pK1').textContent = totalUnits;
  document.getElementById('pK2').textContent = fmtF(globalInvesment);
  document.getElementById('pK3').textContent = totalUnits ? (hist.length / totalUnits).toFixed(1) : 0;
  document.getElementById('pK4').textContent = totalUnits ? fmtF(globalInvesment / totalUnits) : '—';
  renderPropTable();
}

function renderPropTable(){
  const q = document.getElementById('propSearch').value.toLowerCase();
  const dirs = Object.keys(propData).filter(d=> !q || d.toLowerCase().includes(q) || propData[d].prop.toLowerCase().includes(q) || propData[d].inq.toLowerCase().includes(q));
  const el = document.getElementById('propTableBody');
  if(!dirs.length){ el.innerHTML='<tr><td colspan="5" class="nodata">No se localizaron propiedades con el criterio ingresado</td></tr>'; return; }
  el.innerHTML = dirs.slice(0,50).map(d=>{
    const p = propData[d];
    return '<tr style="cursor:pointer" onclick="showPropDetail(decodeURIComponent(\''+encodeURIComponent(d)+'\'))"><td style="font-weight:600;color:var(--green)">'+d+'</td><td style="font-size:13px">'+p.prop+'</td><td style="font-size:13px">'+p.inq+'</td><td class="tr" style="font-weight:700">'+p.count+'</td><td class="tr" style="font-weight:700;color:var(--green)">'+fmtF(p.totalInvested)+'</td></tr>';
  }).join('');
}

function showPropDetail(dir){
  const p = propData[dir]; if(!p) return;
  document.getElementById('propDetailLabel').style.display = '';
  document.getElementById('propDetail').style.display = '';
  document.getElementById('propDetailTitle').textContent = '🏠 ' + dir;
  document.getElementById('propDetail').scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.getElementById('propKpiGrid').innerHTML = [['Arreglos Registrados', p.count],['Total Invertido', fmtF(p.totalInvested)]].map(([l,v])=>'<div class="stat-box"><div class="stat-lbl">'+l+'</div><div class="stat-val">'+v+'</div></div>').join('');
  const mProv = {};
  p.rows.forEach(r=>{ if(r.prov && r.prov!=='Sin asignar') mProv[r.prov] = (mProv[r.prov]||0) + r.cost; });
  const totalBilledDir = Object.values(mProv).reduce((a,b)=>a+b, 0) || 1;
  document.getElementById('propProvShare').innerHTML = Object.entries(mProv).sort((a,b)=>b[1]-a[1]).map(([prov, total])=>'<div style="display:flex;justify-content:space-between;font-size:13px;background:var(--bg);padding:6px 12px;border-radius:6px;"><span>'+prov+'</span><span style="font-weight:600;color:var(--green)">'+Math.round((total/totalBilledDir)*100)+'% ('+fmtF(total)+')</span></div>').join('');
  document.getElementById('propDetailBody').innerHTML = p.rows.map(r=>'<tr><td style="font-size:12px;white-space:nowrap">'+r.date+'</td><td style="font-size:12px;max-width:300px">'+r.desc+'</td><td style="font-size:13px">'+r.prov+'</td><td class="tr" style="font-weight:600;color:var(--green)">'+fmtF(r.cost)+'</td></tr>').join('');
}

function renderProveedores(){
  const pPerf = {};
  store.general.forEach(r=>{
    const pr = (r['Contratista Asignado']||'').trim(); if(!pr || pr==='Sin asignar') return;
    if(!pPerf[pr]) pPerf[pr] = { totalJobs: 0, currentTimes: [], okPrice: 0, okClient: 0 };
    pPerf[pr].totalJobs++;
  });
  store.reclamos.forEach(r=>{
    const pr = (r['Contratista Asignado']||'').trim(); if(!pr || pr==='Sin asignar') return;
    if(!pPerf[pr]) pPerf[pr] = { totalJobs: 0, currentTimes: [], okPrice: 0, okClient: 0 };
    pPerf[pr].totalJobs++;
    const rDate = pD(r['Fecha Recepción Mail']), dDate = pD(r['Fecha Visita/Diagnóstico']);
    if(rDate && dDate){
      const dDays = diff(rDate, dDate);
      if(dDays >= 0) pPerf[pr].currentTimes.push(dDays);
    }
    if((r['Precio Acorde Mercado']||'').toLowerCase().includes('acorde')) pPerf[pr].okPrice++;
    if((r['Conformidad Inquilino']||'').toLowerCase().includes('conforme')) pPerf[pr].okClient++;
  });
  const pFields = ['Plomeria','Gas','Calderas','Electricidad','Albañileria menor','Albañileria mayor','Carpinteria','Colocacion pisos madera','Durlock','Herrería','Pintura','Aires Acondicionados'];
  const grid = document.getElementById('provGrid');
  grid.innerHTML = store.proveedores.map(p=>{
    const name = p['Proveedor'];
    if(!name || name.includes('S/ Asignar') || name.includes('Duplicado')) return '';
    const specs = pFields.filter(f=> (p[f]||'').toString().toUpperCase() === 'SI');
    const mainSpec = specs[0] || 'Servicios Generales';
    const secSpec = specs.slice(1, 3);
    const stats = pPerf[name] || { totalJobs: 0, currentTimes: [], okPrice: 0, okClient: 0 };
    const avgDays = stats.currentTimes.length ? (stats.currentTimes.reduce((a,b)=>a+b,0)/stats.currentTimes.length).toFixed(1) + ' días' : 'S/ Datos';
    let rating = 3;
    if(stats.totalJobs > 0 && stats.currentTimes.length){
      const scoreRatio = (stats.okPrice + stats.okClient) / (stats.totalJobs || 1);
      rating = Math.min(5, Math.max(1, Math.round(3 + scoreRatio * 2)));
    }
    const starStr = '★'.repeat(rating) + '☆'.repeat(5 - rating);
    const secTags = secSpec.map(s=> '<span class="tag-sec">'+s+'</span>').join('');
    return '<div class="prov-card"><div class="prov-head"><div><div class="prov-name">'+name+'</div><div class="prov-contact">📞 '+(p['Contacto'] || 'Sin número')+'</div></div><div class="prov-stars">'+starStr+'</div></div><div class="prov-tags"><span class="tag-main">'+mainSpec+'</span>'+secTags+'</div><div class="prov-metrics"><div><div class="pm-lbl">Reparaciones Realizadas</div><div class="pm-val">'+stats.totalJobs+'</div></div><div><div class="pm-lbl">Tiempo Rta. (Nuevos)</div><div class="pm-val" style="color:var(--green)">'+avgDays+'</div></div></div></div>';
  }).join('');
}

load();
</script>
