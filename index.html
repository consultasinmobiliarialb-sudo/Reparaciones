<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administraciones de la Patagonia · Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        :root { --green: #1F6C43; --gold: #D4AF37; --bg: #f7f8f6; --radius: 14px; }
        body { background: var(--bg); font-family: 'Source Sans 3', sans-serif; color: #1a2e22; }
        .font-head { font-family: 'Playfair Display', serif; }
        .kpi-card { background: white; border-radius: var(--radius); border-top: 4px solid var(--green); transition: all 0.3s; }
        .tab-btn { border-bottom: 3px solid transparent; color: #8aab96; font-weight: 600; }
        .tab-btn.active { border-bottom-color: var(--green); color: var(--green); }
        .badge-actual { background: #dcfce7; color: #166534; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold;}
        .badge-hist { background: #f1f5f9; color: #475569; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold;}
    </style>
</head>
<body class="antialiased">

    <div id="loader" class="fixed inset-0 bg-white/90 z-50 flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-green-700 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-bold text-green-800 uppercase tracking-widest text-xs">Sincronizando con Neuquén...</p>
    </div>

    <!-- HEADER -->
    <header class="bg-[#1F6C43] text-white px-8 py-6 shadow-xl sticky top-0 z-50">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center">
            <div>
                <h1 class="font-head text-2xl">ADMINISTRACIONES DE LA <span class="text-[#D4AF37]">PATAGONIA</span></h1>
                <p class="text-[10px] uppercase tracking-widest opacity-70 italic">Proptech Division · Gestión Consolidada</p>
            </div>
            <button onclick="loadData()" class="bg-[#D4AF37] hover:bg-yellow-600 px-6 py-2 rounded-lg font-bold text-sm shadow-lg transition">↻ ACTUALIZAR</button>
        </div>
    </header>

    <!-- NAVEGACIÓN -->
    <nav class="bg-white border-b border-gray-200 sticky top-[88px] z-40">
        <div class="max-w-[1400px] mx-auto px-8 flex gap-8">
            <button onclick="switchTab('dash')" id="tab-dash" class="tab-btn active py-4">📊 Dashboard</button>
            <button onclick="switchTab('props')" id="tab-props" class="tab-btn py-4">🏠 Propiedades</button>
            <button onclick="switchTab('provs')" id="tab-provs" class="tab-btn py-4">👷 Contratistas</button>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto p-8">

        <!-- FILTROS -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-8 flex flex-wrap gap-6 items-end">
            <div class="min-w-[200px]">
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">Fuente de Datos</label>
                <select id="fSource" onchange="applyFilters()" class="w-full bg-gray-50 border border-gray-200 p-2 rounded-lg text-sm font-bold text-green-800">
                    <option value="all">📂 Ver Todo (Consolidado)</option>
                    <option value="ACTUAL" selected>⚡ Operación Actual</option>
                    <option value="HISTORICO">📜 Archivo Histórico</option>
                </select>
            </div>
            <div class="min-w-[150px]">
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">Año</label>
                <select id="fYear" onchange="applyFilters()" class="w-full bg-gray-50 border border-gray-200 p-2 rounded-lg text-sm"></select>
            </div>
            <div class="ml-auto text-right">
                <p id="countLabel" class="text-3xl font-black text-green-700">0</p>
                <p class="text-[10px] uppercase font-bold text-gray-400">Registros</p>
            </div>
        </div>

        <!-- VISTAS -->
        <div id="view-dash">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="kpi-card p-6 shadow-sm"><p class="text-xs font-bold text-gray-400 uppercase">Inversión Total</p><h2 id="kpi-total" class="text-3xl font-black text-green-800">$ 0</h2></div>
                <div class="kpi-card p-6 shadow-sm"><p class="text-xs font-bold text-gray-400 uppercase">SLA Promedio</p><h2 id="kpi-sla" class="text-3xl font-black text-amber-700">0 d</h2></div>
                <div class="kpi-card p-6 shadow-sm"><p class="text-xs font-bold text-gray-400 uppercase">Urgencia Alta</p><h2 id="kpi-urg" class="text-3xl font-black text-red-700">0</h2></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                    <h3 class="font-bold text-gray-700 mb-6 uppercase text-xs tracking-widest text-center">Gasto por Rubro</h3>
                    <div class="h-64"><canvas id="chartRubros"></canvas></div>
                </div>
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                    <h3 class="font-bold text-gray-700 mb-4 uppercase text-xs tracking-widest">Resumen Financiero</h3>
                    <table class="w-full text-sm"><tbody id="bodyRubrosTable"></tbody></table>
                </div>
            </div>
        </div>

        <div id="view-props" class="hidden">
            <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                <input type="text" id="searchProp" onkeyup="filterProps()" placeholder="🔍 Buscar propiedad..." class="w-full border rounded-lg p-3 mb-6 outline-none focus:ring-2 focus:ring-green-500">
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm" id="tableProps">
                        <thead class="bg-gray-50 uppercase text-[10px] text-gray-400">
                            <tr><th>Fuente</th><th>Dirección</th><th>Propietario</th><th class="text-center">Cant.</th><th class="text-right">Total</th><th>Rubro</th></tr>
                        </thead>
                        <tbody id="bodyProps" class="divide-y"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-provs" class="hidden">
            <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-50 uppercase text-[10px] text-gray-400">
                        <tr><th>Proveedor</th><th>Especialidad</th><th>Rating</th><th class="text-center">Trabajos</th><th class="text-right">Total</th></tr>
                    </thead>
                    <tbody id="bodyProvs" class="divide-y"></tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        let rawData = [], filtered = [], providers = [], charts = {};

        function loadData() {
            toggleLoader(true);
            // Uso de protocolo nativo de Google Apps Script
            google.script.run
                .withSuccessHandler(function(res) {
                    if(res.ok) {
                        rawData = res.reclamos;
                        providers = res.proveedores;
                        initFilters();
                        applyFilters();
                    }
                    toggleLoader(false);
                })
                .withFailureHandler(function(err) {
                    alert("Error al obtener datos: " + err);
                    toggleLoader(false);
                })
                .getDashboardData();
        }

        function initFilters() {
            const years = [...new Set(rawData.map(r => (r['Mes']||'').split('-')[1]))].filter(Boolean).sort().reverse();
            document.getElementById('fYear').innerHTML = '<option value="all">Todos los años</option>' + years.map(y => `<option value="${y}">${y}</option>`).join('');
        }

        function applyFilters() {
            const source = document.getElementById('fSource').value;
            const year = document.getElementById('fYear').value;

            filtered = rawData.filter(r => {
                const [m, y] = (r['Mes']||'').split('-');
                const matchSrc = source === 'all' || r._origen === source;
                const matchY = year === 'all' || y === year;
                return matchSrc && matchY && r['DIRECCION'] && r['Estado Reparacion'] !== 'Pedido Duplicado';
            });

            renderDashboard();
            renderProperties();
            renderProviders();
        }

        function renderDashboard() {
            let total = 0, slaTotal = 0, slaCount = 0, urgentes = 0;
            const rubros = {};

            filtered.forEach(r => {
                const mo = parseFloat(r['Mano de Obra']) || 0;
                const mat = parseFloat(r['Materiales']) || 0;
                total += (mo + mat);
                if((r['Urgencia']||'').includes('Alta')) urgentes++;

                const dRec = r['Recepción Reclamo'] ? new Date(r['Recepción Reclamo']) : null;
                const dAsig = r['Fecha de Asignación'] ? new Date(r['Fecha de Asignación']) : null;
                if(dRec && dAsig && dAsig >= dRec) {
                    slaTotal += Math.floor((dAsig - dRec) / 864e5);
                    slaCount++;
                }

                const rub = detectRubro(r['PEDIDO DE REPARACION']);
                if(!rubros[rub]) rubros[rub] = { n: 0, val: 0 };
                rubros[rub].n++; rubros[rub].val += (mo + mat);
            });

            document.getElementById('kpi-total').innerText = fmt(total);
            document.getElementById('kpi-sla').innerText = slaCount ? (slaTotal/slaCount).toFixed(1) + ' d' : '--';
            document.getElementById('kpi-urg').innerText = urgentes;
            document.getElementById('countLabel').innerText = filtered.length;

            updateChart(rubros);
            renderRubrosTable(rubros);
        }

        function renderProperties() {
            const props = {};
            filtered.forEach(r => {
                const dir = r['DIRECCION'];
                if(!props[dir]) props[dir] = { dir, prop: r['PROPIETARIO'], n: 0, val: 0, rub: '', src: r._origen };
                props[dir].n++;
                props[dir].val += (parseFloat(r['Mano de Obra']) || 0) + (parseFloat(r['Materiales']) || 0);
                props[dir].rub = detectRubro(r['PEDIDO DE REPARACION']);
            });

            document.getElementById('bodyProps').innerHTML = Object.values(props).sort((a,b)=>b.val-a.val).map(p => `
                <tr>
                    <td class="px-4 py-3"><span class="${p.src === 'ACTUAL' ? 'badge-actual' : 'badge-hist'}">${p.src}</span></td>
                    <td class="px-4 py-3 font-bold">${p.dir}</td>
                    <td class="px-4 py-3 text-xs opacity-60">${p.prop}</td>
                    <td class="px-4 py-3 text-center font-bold">${p.n}</td>
                    <td class="px-4 py-3 text-right font-black text-green-700">${fmt(p.val)}</td>
                    <td class="px-4 py-3 text-xs uppercase font-bold text-blue-500">${p.rub}</td>
                </tr>
            `).join('');
        }

        function renderProviders() {
            const pStats = {};
            filtered.forEach(r => {
                const p = r['Contratista Asignado'] || 'S/ Asignar';
                if(!pStats[p]) pStats[p] = { n: 0, val: 0 };
                pStats[p].n++;
                pStats[p].val += (parseFloat(r['Mano de Obra']) || 0) + (parseFloat(r['Materiales']) || 0);
            });

            document.getElementById('bodyProvs').innerHTML = providers.map(p => {
                const s = pStats[p['Nombre']] || { n: 0, val: 0 };
                return `
                    <tr>
                        <td class="px-4 py-3 font-bold text-green-900">${p['Nombre']}</td>
                        <td class="px-4 py-3 text-[10px] text-gray-400 uppercase">${p['Especialidad Principal']}</td>
                        <td class="px-4 py-3 text-amber-500">${'⭐'.repeat(p['Calificacion'])}</td>
                        <td class="px-4 py-3 text-center font-bold">${s.n}</td>
                        <td class="px-4 py-3 text-right font-bold text-green-700">${fmt(s.val)}</td>
                    </tr>
                `;
            }).join('');
        }

        function detectRubro(d) {
            const s = (d||'').toLowerCase();
            if(s.includes('caldera')) return 'Calefacción';
            if(s.includes('agua') || s.includes('bacha')) return 'Plomería';
            if(s.includes('luz') || s.includes('enchufe')) return 'Electricidad';
            if(s.includes('pintura') || s.includes('humedad')) return 'Humedad';
            return 'Varios';
        }

        function fmt(n) { return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(n); }

        function updateChart(data) {
            if(charts.rub) charts.rub.destroy();
            const ctx = document.getElementById('chartRubros').getContext('2d');
            charts.rub = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(data),
                    datasets: [{ data: Object.values(data).map(x => x.val), backgroundColor: '#1F6C43', borderRadius: 8 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function renderRubrosTable(data) {
            document.getElementById('bodyRubrosTable').innerHTML = Object.entries(data).sort((a,b)=>b[1].val-a[1].val).map(([k,v])=>`
                <tr class="border-b"><td class="py-2 font-bold">${k}</td><td class="text-right text-green-700 font-bold">${fmt(v.val)}</td></tr>
            `).join('');
        }

        function switchTab(t) {
            ['dash','props','provs'].forEach(x => {
                document.getElementById(`view-${x}`).classList.toggle('hidden', x !== t);
                document.getElementById(`tab-${x}`).classList.toggle('active', x === t);
            });
        }

        function filterProps() {
            const q = document.getElementById('searchProp').value.toLowerCase();
            const rows = document.getElementById('tableProps').getElementsByTagName('tr');
            for(let i=1; i<rows.length; i++) rows[i].style.display = rows[i].innerText.toLowerCase().includes(q) ? '' : 'none';
        }

        function toggleLoader(s) { document.getElementById('loader').classList.toggle('hidden', !s); }

        window.onload = loadData;
    </script>
</body>
</html>
